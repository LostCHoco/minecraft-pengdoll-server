# Pengdoll Minecraft Servers - Single Source of Truth
#
# 이 파일은 모든 서브시스템(클라이언트 런처, 클라우드 배포, Discord 봇)의
# 참조 원본입니다. 이 파일을 수정하면 각 서브시스템이 자동으로 반영합니다.
#
# 배포 경로: https://lostchoco.github.io/minecraft-pengdoll-server/servers.toml
# 파싱 포맷 안정성을 위해 schema_version을 사용합니다.

schema_version = "1"

[meta]
# packwiz repo의 Pages 베이스 URL. 각 서버의 pack.toml은 {base}/{packwiz.path}/pack.toml 로 결정됩니다.
pack_cdn_base = "https://lostchoco.github.io/minecraft-pengdoll-server"

# 런처 self-update가 확인할 GitHub Releases 경로 (owner/repo)
launcher_release_repo = "LostCHoco/minecraft-pengdoll-server"


# ============================================================
# Modded Survival (Fabric 1.21.1)
# ============================================================
[[servers]]
id = "modded"
name = "Modded Survival"
enabled = true

  [servers.connect]
  host = "pengdoll.duckdns.org"
  port = 25566

  [servers.minecraft]
  version = "1.21.1"
  loader = "fabric"
  loader_version = "0.18.4"
  java_major = 21

  [servers.packwiz]
  path = "modded"                    # CDN에서 /modded/pack.toml 로 fetch

  [servers.server]                   # Docker 컨테이너 구성용
  image_type = "FABRIC"
  memory = "6G"

  [servers.policy]                   # 공통 정책
  difficulty = "hard"
  mode = "survival"
  pvp = false
  max_players = 4
  motd = "Pengdoll World"
  view_distance = 10
  simulation_distance = 6


# ============================================================
# RLCraft (Forge 1.12.2) - 신규
# ============================================================
[[servers]]
id = "rlcraft"
name = "RLCraft"
enabled = true

  [servers.connect]
  host = "pengdoll.duckdns.org"
  port = 25565                       # 기존 바닐라 포트 재사용 예정

  [servers.minecraft]
  version = "1.12.2"
  loader = "forge"
  loader_version = "14.23.5.2860"    # RLCraft 공식 권장 버전, 실제 버전은 Task #2에서 재확인
  java_major = 8

  [servers.packwiz]
  path = "rlcraft"

  [servers.server]
  image_type = "FORGE"
  memory = "8G"

  [servers.policy]
  difficulty = "hard"
  mode = "survival"
  pvp = false
  max_players = 4
  motd = "RLCraft Pengdoll"
  view_distance = 8                  # 1.12.2 + 무거운 모드팩이라 낮게
  simulation_distance = 6

  # server.properties 추가 오버라이드 (itzg/minecraft-server 환경변수 직접 매핑).
  # policy로 표현 안 되는 설정만 이곳에 둡니다.
  [servers.server_properties]
  ALLOW_FLIGHT = "TRUE"              # RLCraft 필수: 비행 mount, fairy ring 등이 킥 안 당하려면
  MAX_TICK_TIME = "-1"               # RLCraft 필수: 큰 구조물 생성 시 Forge가 crash로 오인하지 않도록
  ENABLE_COMMAND_BLOCK = "TRUE"      # RLCraft 필수: 생성된 구조물 내 villager spawn에 필요
